# CottageScene — v0.2 15.C first scene-from-TOML example.
# 这个文件等价于 CottageScene.cpp 里的硬编码，但所有对象 + 字段都在这里。
# 修改后重启 StarArkSamples 即可看到变化（热重载留给 15.D）。

[scene]
name = "CottageScene"
schema_version = 1

# ---------------------------------------------------------------------------
# 主相机 — OrbitCamera / EscapeToQuit 尚未反射，CottageScene 代码会补上。
# ---------------------------------------------------------------------------
[[objects]]
guid = "core:main_camera"
name = "MainCamera"
parent = ""
transform.position = [0.0, 0.0, 0.0]
transform.rotation = [0.0, 0.0, 0.0, 1.0]
transform.scale    = [1.0, 1.0, 1.0]

[[objects.components]]
type = "Camera"
projection = 0          # 0 = Perspective, 1 = Orthographic
fov_deg = 60.0
ortho_size = 5.0
near_clip = 0.1
far_clip = 100.0
priority = 0
clear_color = [0.02, 0.02, 0.03, 1.0]

# ---------------------------------------------------------------------------
# 光照 — 1 方向光 + 2 点光
# ---------------------------------------------------------------------------
[[objects]]
guid = "core:sun"
name = "Sun"
parent = ""
# -50° 俯仰 × 30° 偏航 对 -Z 方向向量旋转（等价于 v0.1 CottageScene 中的
# glm::angleAxis(-50°, X) * glm::angleAxis(30°, Y)），序列化为 [x, y, z, w]。
transform.position = [0.0, 0.0, 0.0]
transform.rotation = [-0.4082, 0.2346, -0.1094, 0.8754]
transform.scale    = [1.0, 1.0, 1.0]

[[objects.components]]
type = "Light"
light_type = 0          # 0 = Directional, 1 = Point, 2 = Spot
color = [1.0, 0.96, 0.88]
intensity = 3.0
range = 10.0
attenuation_const = 1.0
attenuation_lin = 0.09
attenuation_quad = 0.032
spot_inner_deg = 12.5
spot_outer_deg = 17.5
ambient = [0.12, 0.12, 0.12]

[[objects]]
guid = "core:torch_l"
name = "Torch_L"
parent = ""
transform.position = [-1.4, 1.2, 1.6]
transform.rotation = [0.0, 0.0, 0.0, 1.0]
transform.scale    = [1.0, 1.0, 1.0]

[[objects.components]]
type = "Light"
light_type = 1          # Point
color = [1.0, 0.55, 0.25]
intensity = 12.0
range = 8.0
attenuation_const = 1.0
attenuation_lin = 0.09
attenuation_quad = 0.032
spot_inner_deg = 12.5
spot_outer_deg = 17.5
ambient = [0.0, 0.0, 0.0]

[[objects]]
guid = "core:torch_r"
name = "Torch_R"
parent = ""
transform.position = [1.4, 1.2, 1.6]
transform.rotation = [0.0, 0.0, 0.0, 1.0]
transform.scale    = [1.0, 1.0, 1.0]

[[objects.components]]
type = "Light"
light_type = 1
color = [1.0, 0.55, 0.25]
intensity = 12.0
range = 8.0
attenuation_const = 1.0
attenuation_lin = 0.09
attenuation_quad = 0.032
spot_inner_deg = 12.5
spot_outer_deg = 17.5
ambient = [0.0, 0.0, 0.0]

